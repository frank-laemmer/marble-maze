name: Release

on:
  push:
    tags:
      - "v*"

env:
  GODOT_VERSION: "4.6"
  ITCH_USER: "franktheprank"
  ITCH_GAME: "marble-maze"

jobs:
  export:
    name: Export & GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: barichello/godot-ci:4.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          mv /root/.local/share/godot/export_templates/4.6.stable/* \
             ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Create build directories
        run: mkdir -p builds/web builds/windows builds/linux builds/macos

      - name: Export Web
        run: godot --headless --export-release "Web" builds/web/index.html

      - name: Export Windows
        run: godot --headless --export-release "Windows Desktop" builds/windows/MarbleMaze.exe

      - name: Export Linux
        run: godot --headless --export-release "Linux/X11" builds/linux/MarbleMaze.x86_64

      - name: Export macOS
        run: godot --headless --export-release "macOS" builds/macos/MarbleMaze.zip

      - name: Zip desktop builds
        run: |
          cd builds/web     && zip -r ../marble-maze-web.zip .     && cd ../..
          cd builds/windows && zip -r ../marble-maze-windows.zip . && cd ../..
          cd builds/linux   && zip -r ../marble-maze-linux.zip .   && cd ../..
          cp builds/macos/MarbleMaze.zip builds/marble-maze-macos.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            builds/marble-maze-web.zip
            builds/marble-maze-windows.zip
            builds/marble-maze-linux.zip
            builds/marble-maze-macos.zip

      - name: Upload builds as artifact
        uses: actions/upload-artifact@v4
        with:
          name: builds
          path: builds/

  publish:
    name: Publish to itch.io & GitHub Pages
    needs: export
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Download builds
        uses: actions/download-artifact@v4
        with:
          name: builds
          path: builds/

      - name: Push web to itch.io
        uses: josephbmanley/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: web
          ITCH_GAME: ${{ env.ITCH_GAME }}
          ITCH_USER: ${{ env.ITCH_USER }}
          PACKAGE: builds/web

      - name: Push Windows to itch.io
        uses: josephbmanley/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: windows
          ITCH_GAME: ${{ env.ITCH_GAME }}
          ITCH_USER: ${{ env.ITCH_USER }}
          PACKAGE: builds/windows

      - name: Push Linux to itch.io
        uses: josephbmanley/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: linux
          ITCH_GAME: ${{ env.ITCH_GAME }}
          ITCH_USER: ${{ env.ITCH_USER }}
          PACKAGE: builds/linux

      - name: Push macOS to itch.io
        uses: josephbmanley/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: macos
          ITCH_GAME: ${{ env.ITCH_GAME }}
          ITCH_USER: ${{ env.ITCH_USER }}
          PACKAGE: builds/macos/MarbleMaze.zip

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: builds/web
